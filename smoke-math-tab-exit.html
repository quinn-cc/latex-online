<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Math Tab Exit Smoke</title>
  </head>
  <body data-result="pending">
    <script type="module">
      function waitFor(condition, timeout = 10000) {
        const startedAt = Date.now();

        return new Promise((resolve, reject) => {
          const tick = () => {
            const value = condition();

            if (value) {
              resolve(value);
              return;
            }

            if (Date.now() - startedAt > timeout) {
              reject(new Error("Timed out waiting for condition"));
              return;
            }

            setTimeout(tick, 50);
          };

          tick();
        });
      }

      async function withController(run) {
        const iframe = document.createElement("iframe");
        iframe.src = `./?debug=1&smoke=${Date.now()}-${Math.random()}`;
        iframe.style.width = "1280px";
        iframe.style.height = "900px";
        document.body.append(iframe);

        await waitFor(
          () => iframe.contentWindow?.__latexOnlineDebug?.controller?.view
        );

        return run(iframe.contentWindow.__latexOnlineDebug.controller);
      }

      async function dispatchTab(controller, shiftKey = false) {
        const target = controller.getFocusedOrPendingMathTarget();
        const mathView = target ? controller.getMathView(target.id) : null;

        if (!mathView) {
          throw new Error("Expected active math view");
        }

        mathView.mathField.dispatchEvent(
          new KeyboardEvent("keydown", {
            key: "Tab",
            shiftKey,
            bubbles: true,
            cancelable: true,
          })
        );

        await new Promise((resolve) => setTimeout(resolve, 80));
      }

      async function runInlineScenario() {
        return withController(async (controller) => {
          const selection = controller.view.state.selection;
          const tr = controller.buildInlineMathInsertionTransaction(
            controller.view.state,
            selection.from,
            selection.to,
            ""
          );
          controller.dispatchTransaction(tr);

          await waitFor(() => controller.getFocusedOrPendingMathTarget());
          await dispatchTab(controller, false);

          return {
            isMathActive: controller.isMathActive(),
            selection: {
              from: controller.view.state.selection.from,
              to: controller.view.state.selection.to,
              parentType: controller.view.state.selection.$from.parent.type.name,
            },
          };
        });
      }

      async function runDisplayScenario() {
        return withController(async (controller) => {
          const tr = controller.buildDisplayMathInsertionTransaction(
            controller.view.state,
            ""
          );
          controller.dispatchTransaction(tr);

          await waitFor(() => controller.getFocusedOrPendingMathTarget());
          await dispatchTab(controller, false);

          return {
            isMathActive: controller.isMathActive(),
            selection: {
              from: controller.view.state.selection.from,
              to: controller.view.state.selection.to,
              parentType: controller.view.state.selection.$from.parent.type.name,
            },
          };
        });
      }

      try {
        const inlineResult = await runInlineScenario();
        const displayResult = await runDisplayScenario();

        if (inlineResult.isMathActive || inlineResult.selection.parentType !== "paragraph") {
          throw new Error(`Inline exit failed: ${JSON.stringify(inlineResult)}`);
        }

        if (displayResult.isMathActive || displayResult.selection.parentType !== "paragraph") {
          throw new Error(`Display exit failed: ${JSON.stringify(displayResult)}`);
        }

        document.body.dataset.result = "pass";
        document.body.dataset.inline = JSON.stringify(inlineResult);
        document.body.dataset.display = JSON.stringify(displayResult);
      } catch (error) {
        document.body.dataset.result = "fail";
        document.body.dataset.error = error instanceof Error ? error.message : String(error);
        console.error(error);
      }
    </script>
  </body>
</html>
