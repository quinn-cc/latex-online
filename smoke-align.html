<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Align Smoke</title>
  </head>
  <body>
    <script type="module">
      const iframe = document.createElement("iframe");
      iframe.src = "./?debug=1";
      iframe.style.width = "1280px";
      iframe.style.height = "900px";
      document.body.append(iframe);

      function waitFor(condition, timeout = 10000) {
        const startedAt = Date.now();

        return new Promise((resolve, reject) => {
          const tick = () => {
            const value = condition();

            if (value) {
              resolve(value);
              return;
            }

            if (Date.now() - startedAt > timeout) {
              reject(new Error("Timed out waiting for condition"));
              return;
            }

            setTimeout(tick, 50);
          };

          tick();
        });
      }

      function assert(condition, message) {
        if (!condition) {
          throw new Error(message);
        }
      }

      try {
        await waitFor(
          () => iframe.contentWindow?.__latexOnlineDebug?.controller?.view
        );

        const controller = iframe.contentWindow.__latexOnlineDebug.controller;
        const state = controller.view.state;
        const paragraph = controller.view.state.doc.firstChild.firstChild;
        const paragraphStart = 2;
        const tr = state.tr.insertText("\\align", paragraphStart, paragraphStart);

        controller.dispatchTransaction(tr);
        controller.executeBackslashCommandAtSelection();

        await waitFor(() => {
          const doc = controller.view.state.doc;
          const firstBlock = doc.firstChild.firstChild;
          return firstBlock?.type?.name === "align_block";
        });

        const alignItem = controller.getActiveSlashItemState();
        assert(alignItem?.type === "align", "Expected active slash item to be align");
        assert(alignItem.settings.columnCount === 1, "Expected initial columnCount to be 1");

        const toggleButton = iframe.contentDocument.getElementById(
          "slash-item-settings-toggle"
        );
        const form = iframe.contentDocument.getElementById("slash-item-settings-form");

        assert(toggleButton, "Expected slash item settings toggle");
        assert(form, "Expected slash item settings form");

        toggleButton.click();

        await waitFor(() => {
          const input = iframe.contentDocument.getElementById("slash-item-align-columnCount");
          return input && !input.hidden;
        });

        const input = iframe.contentDocument.getElementById("slash-item-align-columnCount");
        input.value = "2";
        form.requestSubmit();

        await waitFor(() => {
          const doc = controller.view.state.doc;
          const alignBlock = doc.firstChild.firstChild;
          return alignBlock?.attrs?.groupCount === 2;
        });

        const alignBlock = controller.view.state.doc.firstChild.firstChild;
        const firstRow = alignBlock.firstChild;

        assert(alignBlock.attrs.groupCount === 2, "Expected groupCount to be 2");
        assert(firstRow.childCount === 4, "Expected first row to have 4 math cells");

        document.body.dataset.result = "pass";
        document.body.dataset.groupCount = String(alignBlock.attrs.groupCount);
        document.body.dataset.cellCount = String(firstRow.childCount);
      } catch (error) {
        document.body.dataset.result = "fail";
        document.body.dataset.error = error instanceof Error ? error.message : String(error);
        console.error(error);
      }
    </script>
  </body>
</html>
