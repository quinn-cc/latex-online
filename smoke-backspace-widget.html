<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Backspace Widget Smoke</title>
  </head>
  <body>
    <script type="module">
      const iframe = document.createElement("iframe");
      iframe.src = "./?debug=1";
      iframe.style.width = "1280px";
      iframe.style.height = "900px";
      document.body.append(iframe);

      function waitFor(condition, timeout = 10000) {
        const startedAt = Date.now();

        return new Promise((resolve, reject) => {
          const tick = () => {
            const value = condition();

            if (value) {
              resolve(value);
              return;
            }

            if (Date.now() - startedAt > timeout) {
              reject(new Error("Timed out waiting for condition"));
              return;
            }

            setTimeout(tick, 50);
          };

          tick();
        });
      }

      try {
        await waitFor(
          () => iframe.contentWindow?.__latexOnlineDebug?.controller?.view
        );

        const controller = iframe.contentWindow.__latexOnlineDebug.controller;
        const state = controller.view.state;
        const paragraphStart = 2;
        const tr = state.tr.insertText("\\align", paragraphStart, paragraphStart);

        controller.dispatchTransaction(tr);
        controller.executeBackslashCommandAtSelection();

        await waitFor(() => {
          const firstBlock = controller.view.state.doc.firstChild.firstChild;
          return firstBlock?.type?.name === "align_block";
        });

        const mathTarget = controller.getFocusedOrPendingMathTarget();
        const mathView = mathTarget ? controller.getMathView(mathTarget.id) : null;

        if (!mathView) {
          throw new Error("Expected focused math view after align insertion");
        }

        mathView.handleKeyDown(
          new iframe.contentWindow.KeyboardEvent("keydown", {
            key: "Backspace",
            bubbles: true,
            cancelable: true,
          })
        );

        await waitFor(() => {
          const firstBlock = controller.view.state.doc.firstChild.firstChild;
          return firstBlock?.type?.name !== "align_block";
        });

        document.body.dataset.result = "pass";
        document.body.dataset.docJson = JSON.stringify(controller.view.state.doc.toJSON());
        document.body.dataset.slashItem = JSON.stringify(
          controller.getActiveSlashItemState()
        );
        document.body.dataset.editorText =
          iframe.contentDocument.getElementById("paper-editor")?.textContent ?? "";
      } catch (error) {
        document.body.dataset.result = "fail";
        document.body.dataset.error = error instanceof Error ? error.message : String(error);
        console.error(error);
      }
    </script>
  </body>
</html>
