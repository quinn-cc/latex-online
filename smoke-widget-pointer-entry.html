<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Widget Pointer Entry Smoke</title>
  </head>
  <body data-result="pending">
    <script type="module">
      function waitFor(condition, timeout = 10000) {
        const startedAt = Date.now();

        return new Promise((resolve, reject) => {
          const tick = () => {
            const value = condition();

            if (value) {
              resolve(value);
              return;
            }

            if (Date.now() - startedAt > timeout) {
              reject(new Error("Timed out waiting for condition"));
              return;
            }

            setTimeout(tick, 50);
          };

          tick();
        });
      }

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function markStep(step, detail = null) {
        document.body.dataset.step = step;

        if (detail == null) {
          delete document.body.dataset.stepDetail;
          return;
        }

        document.body.dataset.stepDetail =
          typeof detail === "string" ? detail : JSON.stringify(detail);
      }

      async function withController(run) {
        const iframe = document.createElement("iframe");
        iframe.src = `./?debug=1&smoke=${Date.now()}-${Math.random()}`;
        iframe.style.width = "1280px";
        iframe.style.height = "900px";
        document.body.append(iframe);

        await waitFor(
          () => iframe.contentWindow?.__latexOnlineDebug?.controller?.view
        );

        const controller = iframe.contentWindow.__latexOnlineDebug.controller;
        controller.clear();
        await sleep(80);
        return run(controller, iframe.contentWindow);
      }

      function insertCommand(controller, commandName) {
        controller.view.focus();
        controller.dispatchTransaction(
          controller.view.state.tr.insertText(`\\${commandName}`)
        );

        if (!controller.executeBackslashCommandAtSelection()) {
          throw new Error(`Expected \\\\${commandName} command to execute`);
        }
      }

      function dispatchContainerMouseDown(target, contentWindow, clientX, clientY) {
        target.dispatchEvent(
          new contentWindow.MouseEvent("mousedown", {
            bubbles: true,
            cancelable: true,
            clientX,
            clientY,
          })
        );
      }

      function getMathSnapshot(mathView) {
        const content =
          mathView.mathField.shadowRoot?.querySelector('[part="content"]') ?? null;
        const view = mathView.mathField.ownerDocument.defaultView;
        const caret =
          mathView.mathField.shadowRoot?.querySelector(
            ".ML__caret, .ML__text-caret, .ML__latex-caret"
          ) ?? null;
        const caretRect = caret?.getBoundingClientRect?.() ?? null;
        const fieldRect = mathView.mathField.getBoundingClientRect();
        const contentRect = content?.getBoundingClientRect?.() ?? null;
        const endCaretRoom =
          Number.isFinite(contentRect?.right) && Number.isFinite(caretRect?.right)
            ? contentRect.right - caretRect.right
            : null;

        return {
          position: mathView.mathField.position,
          lastOffset: mathView.mathField.lastOffset,
          selectionIsCollapsed: mathView.mathField.selectionIsCollapsed,
          hasCaret: Boolean(caret),
          caretRight: caretRect?.right ?? null,
          contentRight: contentRect?.right ?? null,
          endCaretRoom,
          fieldRight: fieldRect.right,
          isActiveElement:
            mathView.mathField.ownerDocument.activeElement === mathView.mathField,
          hostPaddingInlineEnd: view?.getComputedStyle(mathView.mathField).paddingInlineEnd ?? null,
          contentPaddingInlineEnd: content
            ? view?.getComputedStyle(content).paddingInlineEnd ?? null
            : null,
        };
      }

      async function clickMathRight(target, contentWindow) {
        const rect = target.getBoundingClientRect();
        dispatchContainerMouseDown(
          target,
          contentWindow,
          rect.right - 2,
          rect.top + rect.height / 2
        );
        await sleep(80);
      }

      async function waitForMathViewAtEnd(controller, mathId, step) {
        let lastSnapshot = null;

        try {
          return await waitFor(() => {
            const currentView = controller.getMathView(mathId);
            lastSnapshot = currentView ? getMathSnapshot(currentView) : null;
            markStep(step, lastSnapshot);

            return lastSnapshot?.position === lastSnapshot?.lastOffset
              ? lastSnapshot
              : null;
          });
        } catch (error) {
          throw new Error(
            `${error instanceof Error ? error.message : String(error)}: ${JSON.stringify(lastSnapshot)}`
          );
        }
      }

      async function runInlineScenario() {
        return withController(async (controller, contentWindow) => {
          markStep("inline.insert");
          const tr = controller.buildInlineMathInsertionTransaction(
            controller.view.state,
            controller.view.state.selection.from,
            controller.view.state.selection.to,
            "xy"
          );
          controller.dispatchTransaction(tr);

          markStep("inline.waitTarget");
          const target = await waitFor(() => controller.getFocusedOrPendingMathTarget());
          markStep("inline.waitView", target);
          const mathView = await waitFor(() => controller.getMathView(target.id));

          markStep("inline.exit");
          if (!controller.commitAndExitMathNode(target.pos, "after")) {
            throw new Error("Expected to exit inline math before clicking back in");
          }

          markStep("inline.click");
          await sleep(80);
          await clickMathRight(mathView.mathField, contentWindow);

          const snapshot = await waitForMathViewAtEnd(
            controller,
            target.id,
            "inline.waitEnd"
          );

          return snapshot;
        });
      }

      function assertVisibleEndCaret(snapshot, label) {
        if (!snapshot.selectionIsCollapsed || !snapshot.hasCaret) {
          throw new Error(
            `Expected ${label} right-click entry to end with a visible caret: ${JSON.stringify(snapshot)}`
          );
        }

        if (!(snapshot.endCaretRoom >= 0.5)) {
          throw new Error(
            `Expected ${label} right-click entry to reserve visible caret room at the end: ${JSON.stringify(snapshot)}`
          );
        }
      }

      async function runGridScenario(commandName, expectedType) {
        return withController(async (controller, contentWindow) => {
          markStep(`${commandName}.insert`);
          insertCommand(controller, commandName);

          markStep(`${commandName}.waitWidget`);
          const widgetNode = await waitFor(() => {
            const firstBlock = controller.view.state.doc.firstChild.firstChild;
            return firstBlock?.type?.name === expectedType ? firstBlock : null;
          });
          const widgetPos = 1;
          markStep(`${commandName}.waitTarget`);
          const target = await waitFor(() => controller.getFocusedOrPendingMathTarget());
          markStep(`${commandName}.commit`, target);
          controller.commitMathNode(target.pos, { latex: "xy" });
          await waitFor(
            () => controller.view.state.doc.nodeAt(target.pos)?.attrs?.latex === "xy"
          );

          markStep(`${commandName}.waitView`);
          const mathView = await waitFor(() => controller.getMathView(target.id));

          markStep(`${commandName}.exit`);
          if (!controller.exitFullLineWidgetBoundary(widgetPos, widgetNode, "after")) {
            throw new Error(`Expected to exit ${commandName} before clicking back in`);
          }

          markStep(`${commandName}.click`);
          await sleep(80);
          await clickMathRight(mathView.dom, contentWindow);

          const snapshot = await waitForMathViewAtEnd(
            controller,
            target.id,
            `${commandName}.waitEnd`
          );

          return snapshot;
        });
      }

      try {
        markStep("start");
        const inline = await runInlineScenario();
        const align = await runGridScenario("align", "align_block");
        const gather = await runGridScenario("gather", "gather_block");

        assertVisibleEndCaret(inline, "inline");
        assertVisibleEndCaret(align, "align");
        assertVisibleEndCaret(gather, "gather");

        document.body.dataset.result = "pass";
        document.body.dataset.inline = JSON.stringify(inline);
        document.body.dataset.align = JSON.stringify(align);
        document.body.dataset.gather = JSON.stringify(gather);
      } catch (error) {
        document.body.dataset.result = "fail";
        document.body.dataset.error = error instanceof Error ? error.message : String(error);
        console.error(error);
      }
    </script>
  </body>
</html>
