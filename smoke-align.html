<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Align Smoke</title>
  </head>
  <body>
    <script type="module">
      function markStep(step, detail = null) {
        document.body.dataset.step = step;

        if (detail == null) {
          delete document.body.dataset.stepDetail;
          return;
        }

        document.body.dataset.stepDetail =
          typeof detail === "string" ? detail : JSON.stringify(detail);
      }

      const iframe = document.createElement("iframe");
      iframe.src = "./?debug=1";
      iframe.style.width = "1280px";
      iframe.style.height = "900px";
      document.body.append(iframe);

      function waitFor(condition, timeout = 10000) {
        const startedAt = Date.now();

        return new Promise((resolve, reject) => {
          const tick = () => {
            const value = condition();

            if (value) {
              resolve(value);
              return;
            }

            if (Date.now() - startedAt > timeout) {
              reject(new Error("Timed out waiting for condition"));
              return;
            }

            setTimeout(tick, 50);
          };

          tick();
        });
      }

      function assert(condition, message) {
        if (!condition) {
          throw new Error(message);
        }
      }

      function pressSettingsButton(button, win, label) {
        assert(button, `Expected ${label}`);
        const mouseDown = new win.MouseEvent("mousedown", {
          bubbles: true,
          cancelable: true,
        });
        button.dispatchEvent(mouseDown);
        assert(
          mouseDown.defaultPrevented,
          `Expected ${label} mousedown to preserve widget settings context`
        );
        button.dispatchEvent(
          new win.MouseEvent("mouseup", {
            bubbles: true,
            cancelable: true,
          })
        );
        button.click();
      }

      function insertCommand(controller, commandName) {
        controller.view.focus();
        controller.dispatchTransaction(
          controller.view.state.tr.insertText(`\\${commandName}`)
        );

        if (!controller.executeBackslashCommandAtSelection()) {
          throw new Error(`Expected \\\\${commandName} command to execute`);
        }
      }

      try {
        markStep("boot");
        await waitFor(
          () => iframe.contentWindow?.__latexOnlineDebug?.controller?.view
        );

        const controller = iframe.contentWindow.__latexOnlineDebug.controller;
        const contentDocument = iframe.contentDocument;

        insertCommand(controller, "align");

        markStep("waitWidget");
        await waitFor(() => controller.getActiveSlashItemState()?.type === "align");
        await waitFor(
          () => !(contentDocument.getElementById("slash-item-settings")?.hidden ?? true)
        );

        const alignItem = controller.getActiveSlashItemState();
        markStep("activeItem", alignItem);
        assert(alignItem?.type === "align", "Expected active slash item to be align");
        assert(alignItem.settings.columnCount === 1, "Expected initial columnCount to be 1");

        const toggleButton = contentDocument.getElementById(
          "slash-item-settings-toggle"
        );
        const applyButton = contentDocument.getElementById("slash-item-settings-apply");

        assert(toggleButton, "Expected slash item settings toggle");
        assert(applyButton, "Expected slash item settings apply button");

        markStep("toggle.before", {
          overlayHidden: contentDocument.getElementById("slash-item-settings")?.hidden ?? null,
          activeItem: controller.getActiveSlashItemState(),
        });
        toggleButton.click();

        markStep("toggle.after", {
          overlayHidden: contentDocument.getElementById("slash-item-settings")?.hidden ?? null,
          panelHidden: contentDocument.getElementById("slash-item-settings-panel")?.hidden ?? null,
          activeItem: controller.getActiveSlashItemState(),
        });
        await waitFor(() => {
          const input = contentDocument.getElementById("slash-item-align-columnCount");
          markStep("waitInput", {
            hasInput: Boolean(input),
            inputHidden: input?.hidden ?? null,
            overlayHidden: contentDocument.getElementById("slash-item-settings")?.hidden ?? null,
            panelHidden: contentDocument.getElementById("slash-item-settings-panel")?.hidden ?? null,
            activeItem: controller.getActiveSlashItemState(),
          });
          return Boolean(input);
        });

        const input = contentDocument.getElementById("slash-item-align-columnCount");
        input.value = "2";
        input.dispatchEvent(
          new contentDocument.defaultView.Event("input", { bubbles: true })
        );
        pressSettingsButton(
          applyButton,
          contentDocument.defaultView,
          "Align apply button"
        );

        await waitFor(() => {
          const alignBlock = controller.view.state.doc.firstChild.firstChild;
          return alignBlock?.type?.name === "align_block"
            && alignBlock?.attrs?.groupCount === 2
            && alignBlock?.firstChild?.childCount === 4;
        });

        const alignBlock = controller.view.state.doc.firstChild.firstChild;
        const firstRow = alignBlock.firstChild;

        assert(alignBlock.attrs.groupCount === 2, "Expected groupCount to be 2");
        assert(firstRow.childCount === 4, "Expected first row to have 4 math cells");

        document.body.dataset.result = "pass";
        document.body.dataset.groupCount = String(alignBlock.attrs.groupCount);
        document.body.dataset.cellCount = String(firstRow.childCount);
      } catch (error) {
        document.body.dataset.result = "fail";
        document.body.dataset.error = error instanceof Error ? error.message : String(error);
        console.error(error);
      }
    </script>
  </body>
</html>
