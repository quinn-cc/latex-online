<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Settings Gear Tab Stability Smoke</title>
  </head>
  <body data-result="pending">
    <script type="module">
      function waitFor(condition, timeout = 10000) {
        const startedAt = Date.now();

        return new Promise((resolve, reject) => {
          const tick = () => {
            const value = condition();

            if (value) {
              resolve(value);
              return;
            }

            if (Date.now() - startedAt > timeout) {
              reject(new Error("Timed out waiting for condition"));
              return;
            }

            setTimeout(tick, 50);
          };

          tick();
        });
      }

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function assert(condition, message) {
        if (!condition) {
          throw new Error(message);
        }
      }

      function insertCommand(controller, commandName) {
        controller.view.focus();
        controller.dispatchTransaction(
          controller.view.state.tr.insertText(`\\${commandName}`)
        );

        if (!controller.executeBackslashCommandAtSelection()) {
          throw new Error(`Expected \\\\${commandName} command to execute`);
        }
      }

      function getSettingsOverlay(doc) {
        return doc.getElementById("slash-item-settings");
      }

      function getSettingsToggle(doc) {
        return doc.getElementById("slash-item-settings-toggle");
      }

      function isSettingsVisible(doc) {
        return Boolean(getSettingsOverlay(doc) && !getSettingsOverlay(doc).hidden);
      }

      function getTogglePosition(doc) {
        const toggle = getSettingsToggle(doc);
        assert(toggle, "Expected settings toggle");
        const rect = toggle.getBoundingClientRect();

        return {
          top: rect.top,
          left: rect.left,
          right: rect.right,
          bottom: rect.bottom,
        };
      }

      function getAnchorSnapshot(controller, doc) {
        const activeItem = controller.getActiveSlashItemState();
        const widgetRect = activeItem
          ? controller.getSlashItemClientRect(activeItem)
          : null;
        const toggleRect = getTogglePosition(doc);

        return {
          toggleRect,
          widgetRect,
          topDelta:
            widgetRect == null
              ? null
              : toggleRect.top - widgetRect.top,
          leftDelta:
            widgetRect == null
              ? null
              : toggleRect.left - (widgetRect.right + 8),
        };
      }

      function assertStablePosition(previous, next, label) {
        const topDelta = Math.abs((previous.topDelta ?? 0) - (next.topDelta ?? 0));
        const leftDelta = Math.abs((previous.leftDelta ?? 0) - (next.leftDelta ?? 0));

        assert(
          topDelta <= 1.5 && leftDelta <= 1.5,
          `Expected ${label} gear position to stay stable during internal Tab navigation`
        );
      }

      async function getControllerContext() {
        const iframe = document.createElement("iframe");
        iframe.src = `./?debug=1&smoke=${Date.now()}-${Math.random()}`;
        iframe.style.width = "1280px";
        iframe.style.height = "900px";
        document.body.append(iframe);

        await waitFor(
          () => iframe.contentWindow?.__latexOnlineDebug?.controller?.view
        );

        return {
          iframe,
          contentWindow: iframe.contentWindow,
          contentDocument: iframe.contentDocument,
          controller: iframe.contentWindow.__latexOnlineDebug.controller,
        };
      }

      async function withController(run) {
        const context = await getControllerContext();
        const { iframe, controller, contentWindow, contentDocument } = context;

        controller.clear();
        await sleep(80);
        contentWindow.focus();

        try {
          return await run(controller, contentWindow, contentDocument);
        } finally {
          iframe.remove();
        }
      }

      async function runStabilityScenario({
        commandName,
        expectedType,
        steps,
      }) {
        return withController(async (controller, contentWindow, contentDocument) => {
          insertCommand(controller, commandName);

          const activeItem = await waitFor(() => {
            const item = controller.getActiveSlashItemState();
            return item?.type === expectedType ? item : null;
          });
          await waitFor(() => isSettingsVisible(contentDocument));

          const widgetPos = activeItem.pos;
          assert(Number.isFinite(widgetPos), `Expected ${expectedType} widget position`);

          const overlay = getSettingsOverlay(contentDocument);
          const hiddenTransitions = [];
          const observer = new MutationObserver(() => {
            hiddenTransitions.push(overlay.hidden);
          });
          observer.observe(overlay, {
            attributes: true,
            attributeFilter: ["hidden"],
          });

          const positions = [getAnchorSnapshot(controller, contentDocument)];

          for (const step of steps) {
            assert(step(controller), `Expected ${expectedType} internal Tab move`);
            await waitFor(() => isSettingsVisible(contentDocument));
            await sleep(80);

            const nextPosition = getAnchorSnapshot(controller, contentDocument);
            document.body.dataset.lastScenario = expectedType;
            document.body.dataset.lastPositions = JSON.stringify(positions.concat([nextPosition]));
            document.body.dataset.lastHiddenTransitions = JSON.stringify(hiddenTransitions);
            assertStablePosition(
              positions[positions.length - 1],
              nextPosition,
              expectedType
            );
            positions.push(nextPosition);

            assert(
              controller.getActiveSlashItemState()?.type === expectedType,
              `Expected ${expectedType} to remain active during internal Tab navigation`
            );
          }

          observer.disconnect();

          assert(
            hiddenTransitions.every((value) => value === false),
            `Expected ${expectedType} gear to stay visible during internal Tab navigation`
          );

          return {
            type: expectedType,
            hiddenTransitions,
            positions,
          };
        });
      }

      try {
        const table = await runStabilityScenario({
          commandName: "table",
          expectedType: "table",
          steps: [
            (controller) => controller.handleTab(false),
            (controller) => controller.handleTab(false),
            (controller) => controller.handleTab(false),
          ],
        });
        const align = await runStabilityScenario({
          commandName: "align",
          expectedType: "align",
          steps: [
            (controller) => {
              const mathTarget = controller.getFocusedOrPendingMathTarget();
              const mathView = mathTarget ? controller.getMathView(mathTarget.id) : null;
              return mathView?.handleTabNavigation("forward") === true;
            },
          ],
        });

        document.body.dataset.result = "pass";
        document.body.dataset.table = JSON.stringify(table);
        document.body.dataset.align = JSON.stringify(align);
      } catch (error) {
        document.body.dataset.result = "fail";
        document.body.dataset.error = error instanceof Error ? error.message : String(error);
        console.error(error);
      }
    </script>
  </body>
</html>
