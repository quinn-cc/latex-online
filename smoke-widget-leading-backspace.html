<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Widget Leading Backspace Smoke</title>
  </head>
  <body data-result="pending">
    <script type="module">
      function waitFor(condition, timeout = 10000) {
        const startedAt = Date.now();

        return new Promise((resolve, reject) => {
          const tick = () => {
            const value = condition();

            if (value) {
              resolve(value);
              return;
            }

            if (Date.now() - startedAt > timeout) {
              reject(new Error("Timed out waiting for condition"));
              return;
            }

            setTimeout(tick, 50);
          };

          tick();
        });
      }

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      async function withController(run) {
        const iframe = document.createElement("iframe");
        iframe.src = `./?debug=1&smoke=${Date.now()}-${Math.random()}`;
        iframe.style.width = "1280px";
        iframe.style.height = "900px";
        document.body.append(iframe);

        await waitFor(
          () => iframe.contentWindow?.__latexOnlineDebug?.controller?.view
        );

        const controller = iframe.contentWindow.__latexOnlineDebug.controller;
        controller.clear();
        await sleep(80);
        return run(controller, iframe.contentWindow);
      }

      function setSelection(controller, pos, bias = 1) {
        const SelectionClass = controller.view.state.selection.constructor;
        const tr = controller.view.state.tr.setSelection(
          SelectionClass.near(controller.view.state.doc.resolve(pos), bias)
        );

        controller.dispatchTransaction(tr);
        controller.activeMathId = null;
        controller.cancelPendingMathFocus();
      }

      function insertCommand(controller, commandName) {
        controller.view.focus();
        controller.dispatchTransaction(
          controller.view.state.tr.insertText(`\\${commandName}`)
        );

        if (!controller.executeBackslashCommandAtSelection()) {
          throw new Error(`Expected \\\\${commandName} command to execute`);
        }
      }

      function getTopLevelBlocks(controller) {
        const page = controller.view.state.doc.firstChild;
        return page
          ? Array.from({ length: page.childCount }, (_, index) => page.child(index))
          : [];
      }

      async function dispatchMathBackspace(controller, contentWindow, mathId) {
        const mathView = await waitFor(() => controller.getMathView(mathId));

        mathView.focusAtEdge?.("start");
        await sleep(80);
        mathView.mathField.position = 0;
        mathView.mathField.dispatchEvent(
          new contentWindow.KeyboardEvent("keydown", {
            key: "Backspace",
            bubbles: true,
            cancelable: true,
          })
        );
      }

      function dispatchEditorBackspace(controller, contentWindow) {
        controller.view.dom.dispatchEvent(
          new contentWindow.KeyboardEvent("keydown", {
            key: "Backspace",
            bubbles: true,
            cancelable: true,
          })
        );
      }

      async function runInlineLeadingBackspaceScenario() {
        return withController(async (controller, contentWindow) => {
          const selection = controller.view.state.selection;
          const tr = controller.buildInlineMathInsertionTransaction(
            controller.view.state,
            selection.from,
            selection.to,
            "x"
          );

          controller.dispatchTransaction(tr);

          const mathTarget = await waitFor(() =>
            controller.getFocusedOrPendingMathTarget()
          );
          await dispatchMathBackspace(controller, contentWindow, mathTarget.id);

          await waitFor(() => {
            const firstBlock = controller.view.state.doc.firstChild.firstChild;
            return (
              firstBlock?.type?.name === "paragraph" &&
              !firstBlock.content.content.some((node) => node.type?.name === "inline_math")
            );
          });

          return controller.view.state.doc.toJSON();
        });
      }

      async function runTableLeadingBackspaceScenario() {
        return withController(async (controller, contentWindow) => {
          insertCommand(controller, "table");

          await waitFor(() => {
            const firstBlock = controller.view.state.doc.firstChild.firstChild;
            return firstBlock?.type?.name === "table";
          });

          const leadingPos = controller.view.state.selection.from;
          controller.dispatchTransaction(controller.view.state.tr.insertText("x"));
          setSelection(controller, leadingPos, 1);
          await sleep(80);
          dispatchEditorBackspace(controller, contentWindow);

          await waitFor(() => {
            const blocks = getTopLevelBlocks(controller);
            return blocks.length === 1 && blocks[0]?.type?.name === "paragraph";
          });

          return controller.view.state.doc.toJSON();
        });
      }

      async function runTableNonLeadingBackspaceScenario() {
        return withController(async (controller, contentWindow) => {
          insertCommand(controller, "table");

          await waitFor(() => {
            const firstBlock = controller.view.state.doc.firstChild.firstChild;
            return firstBlock?.type?.name === "table";
          });

          if (!controller.moveToNextTableCellOrExit()) {
            throw new Error("Expected to move from the first table cell to the second");
          }

          const secondCellPos = controller.view.state.selection.from;
          controller.dispatchTransaction(controller.view.state.tr.insertText("y"));
          setSelection(controller, secondCellPos, 1);
          await sleep(80);
          dispatchEditorBackspace(controller, contentWindow);
          await sleep(120);

          const firstBlock = controller.view.state.doc.firstChild.firstChild;

          if (firstBlock?.type?.name !== "table") {
            throw new Error("Expected Backspace in a non-leading table cell to keep the table");
          }

          return controller.view.state.doc.toJSON();
        });
      }

      async function runAlignLeadingBackspaceScenario() {
        return withController(async (controller, contentWindow) => {
          insertCommand(controller, "align");

          await waitFor(() => {
            const firstBlock = controller.view.state.doc.firstChild.firstChild;
            return firstBlock?.type?.name === "align_block";
          });

          const mathTarget = await waitFor(() =>
            controller.getFocusedOrPendingMathTarget()
          );
          controller.commitMathNode(mathTarget.pos, { latex: "x" });
          await waitFor(
            () => controller.view.state.doc.nodeAt(mathTarget.pos)?.attrs?.latex === "x"
          );
          await dispatchMathBackspace(controller, contentWindow, mathTarget.id);

          await waitFor(() => {
            const blocks = getTopLevelBlocks(controller);
            return blocks.length === 1 && blocks[0]?.type?.name === "paragraph";
          });

          return controller.view.state.doc.toJSON();
        });
      }

      async function runAlignNonLeadingBackspaceScenario() {
        return withController(async (controller, contentWindow) => {
          insertCommand(controller, "align");

          await waitFor(() => {
            const firstBlock = controller.view.state.doc.firstChild.firstChild;
            return firstBlock?.type?.name === "align_block";
          });

          const firstTarget = await waitFor(() =>
            controller.getFocusedOrPendingMathTarget()
          );

          if (!controller.moveToAlignCellFromMath(firstTarget.pos, 0, 1, { latex: "x" })) {
            throw new Error("Expected to move from the first align cell to the second");
          }

          const secondTarget = await waitFor(() => {
            const target = controller.getFocusedOrPendingMathTarget();
            return target && target.pos !== firstTarget.pos ? target : null;
          });

          controller.commitMathNode(secondTarget.pos, { latex: "y" });
          await waitFor(
            () => controller.view.state.doc.nodeAt(secondTarget.pos)?.attrs?.latex === "y"
          );
          await dispatchMathBackspace(controller, contentWindow, secondTarget.id);
          await sleep(120);

          const firstBlock = controller.view.state.doc.firstChild.firstChild;

          if (firstBlock?.type?.name !== "align_block") {
            throw new Error("Expected Backspace in a non-leading align cell to keep the widget");
          }

          return controller.view.state.doc.toJSON();
        });
      }

      async function runGatherLeadingBackspaceScenario() {
        return withController(async (controller, contentWindow) => {
          insertCommand(controller, "gather");

          await waitFor(() => {
            const firstBlock = controller.view.state.doc.firstChild.firstChild;
            return firstBlock?.type?.name === "gather_block";
          });

          const mathTarget = await waitFor(() =>
            controller.getFocusedOrPendingMathTarget()
          );
          controller.commitMathNode(mathTarget.pos, { latex: "x" });
          await waitFor(
            () => controller.view.state.doc.nodeAt(mathTarget.pos)?.attrs?.latex === "x"
          );
          await dispatchMathBackspace(controller, contentWindow, mathTarget.id);

          await waitFor(() => {
            const blocks = getTopLevelBlocks(controller);
            return blocks.length === 1 && blocks[0]?.type?.name === "paragraph";
          });

          return controller.view.state.doc.toJSON();
        });
      }

      try {
        const inlineLeading = await runInlineLeadingBackspaceScenario();
        const tableLeading = await runTableLeadingBackspaceScenario();
        const tableNonLeading = await runTableNonLeadingBackspaceScenario();
        const alignLeading = await runAlignLeadingBackspaceScenario();
        const alignNonLeading = await runAlignNonLeadingBackspaceScenario();
        const gatherLeading = await runGatherLeadingBackspaceScenario();

        document.body.dataset.result = "pass";
        document.body.dataset.inlineLeading = JSON.stringify(inlineLeading);
        document.body.dataset.tableLeading = JSON.stringify(tableLeading);
        document.body.dataset.tableNonLeading = JSON.stringify(tableNonLeading);
        document.body.dataset.alignLeading = JSON.stringify(alignLeading);
        document.body.dataset.alignNonLeading = JSON.stringify(alignNonLeading);
        document.body.dataset.gatherLeading = JSON.stringify(gatherLeading);
      } catch (error) {
        document.body.dataset.result = "fail";
        document.body.dataset.error = error instanceof Error ? error.message : String(error);
        console.error(error);
      }
    </script>
  </body>
</html>
