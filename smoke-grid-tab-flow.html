<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Grid Tab Flow Smoke</title>
  </head>
  <body data-result="pending">
    <script type="module">
      function waitFor(condition, timeout = 10000) {
        const startedAt = Date.now();

        return new Promise((resolve, reject) => {
          const tick = () => {
            const value = condition();

            if (value) {
              resolve(value);
              return;
            }

            if (Date.now() - startedAt > timeout) {
              reject(new Error("Timed out waiting for condition"));
              return;
            }

            setTimeout(tick, 50);
          };

          tick();
        });
      }

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function markStep(step, detail = null) {
        document.body.dataset.step = step;

        if (detail == null) {
          delete document.body.dataset.stepDetail;
          return;
        }

        document.body.dataset.stepDetail =
          typeof detail === "string" ? detail : JSON.stringify(detail);
      }

      async function withController(run) {
        const iframe = document.createElement("iframe");
        iframe.src = `./?debug=1&smoke=${Date.now()}-${Math.random()}`;
        iframe.style.width = "1280px";
        iframe.style.height = "900px";
        document.body.append(iframe);

        await waitFor(
          () => iframe.contentWindow?.__latexOnlineDebug?.controller?.view
        );

        const controller = iframe.contentWindow.__latexOnlineDebug.controller;
        controller.clear();
        await sleep(80);
        return run(controller, iframe.contentWindow);
      }

      function insertCommand(controller, commandName) {
        controller.view.focus();
        controller.dispatchTransaction(
          controller.view.state.tr.insertText(`\\${commandName}`)
        );

        if (!controller.executeBackslashCommandAtSelection()) {
          throw new Error(`Expected \\\\${commandName} command to execute`);
        }
      }

      async function dispatchMathTab(controller, contentWindow, isShift = false) {
        const target = await waitFor(() => controller.getFocusedOrPendingMathTarget());
        const mathView = await waitFor(() => controller.getMathView(target.id));

        mathView.mathField.dispatchEvent(
          new contentWindow.KeyboardEvent("keydown", {
            key: "Tab",
            shiftKey: isShift,
            bubbles: true,
            cancelable: true,
          })
        );
        await sleep(80);
      }

      async function dispatchEditorKey(controller, contentWindow, key, options = {}) {
        controller.view.focus();
        controller.view.dom.dispatchEvent(
          new contentWindow.KeyboardEvent("keydown", {
            key,
            bubbles: true,
            cancelable: true,
            ...options,
          })
        );
        await sleep(80);
      }

      function getMathSelectionSnapshot(controller) {
        const target = controller.getFocusedOrPendingMathTarget();
        const mathView = target ? controller.getMathView(target.id) : null;
        const selection = mathView?.mathField?.selection ?? null;

        return {
          id: target?.id ?? null,
          pos: target?.pos ?? null,
          type: target?.node?.type?.name ?? null,
          isCollapsed: mathView?.mathField?.selectionIsCollapsed ?? null,
          position: mathView?.mathField?.position ?? null,
          lastOffset: mathView?.mathField?.lastOffset ?? null,
          selection: selection
            ? {
                ranges: selection.ranges ?? null,
                direction: selection.direction ?? null,
              }
            : null,
        };
      }

      function getTableSelectionIndices(selection, schema) {
        let rowIndex = null;
        let cellIndex = null;

        for (let depth = selection.$from.depth; depth >= 0; depth -= 1) {
          const node = selection.$from.node(depth);

          if (cellIndex == null && node.type === schema.nodes.table_row) {
            cellIndex = selection.$from.index(depth);
            continue;
          }

          if (rowIndex == null && node.type === schema.nodes.table) {
            rowIndex = selection.$from.index(depth);
            break;
          }
        }

        return {
          rowIndex,
          cellIndex,
        };
      }

      function getTableSelectionSnapshot(controller) {
        const selection = controller.view.state.selection;
        const indices = getTableSelectionIndices(selection, controller.view.state.schema);

        return {
          from: selection.from,
          to: selection.to,
          empty: selection.empty,
          parentType: selection.$from.parent.type.name,
          text: controller.view.state.doc.textBetween(selection.from, selection.to, "", ""),
          rowIndex: indices.rowIndex,
          cellIndex: indices.cellIndex,
        };
      }

      async function runAlignTabScenario() {
        return withController(async (controller, contentWindow) => {
          markStep("align.insert");
          insertCommand(controller, "align");

          markStep("align.waitFirstTarget");
          const firstTarget = await waitFor(() =>
            controller.getFocusedOrPendingMathTarget()
          );
          markStep("align.commitFirst", firstTarget);
          controller.commitMathNode(firstTarget.pos, { latex: "x" });
          markStep("align.waitFirstCommit");
          await waitFor(
            () => controller.view.state.doc.nodeAt(firstTarget.pos)?.attrs?.latex === "x"
          );

          markStep("align.moveSecond");
          if (!controller.moveToAlignCellFromMath(firstTarget.pos, 0, 1, null, {
            entryMode: "collapse",
            focusEdge: "start",
          })) {
            throw new Error("Expected to move from the first align cell to the second");
          }

          markStep("align.waitSecondTarget");
          const secondTarget = await waitFor(() => {
            const target = controller.getFocusedOrPendingMathTarget();
            return target && target.pos !== firstTarget.pos ? target : null;
          });
          markStep("align.commitSecond", secondTarget);
          controller.commitMathNode(secondTarget.pos, { latex: "y" });
          markStep("align.waitSecondCommit");
          await waitFor(
            () => controller.view.state.doc.nodeAt(secondTarget.pos)?.attrs?.latex === "y"
          );

          markStep("align.moveFirst");
          if (!controller.moveToAlignCellFromMath(secondTarget.pos, 0, 0, null, {
            entryMode: "collapse",
            focusEdge: "start",
          })) {
            throw new Error("Expected to move back to the first align cell");
          }

          markStep("align.waitReturnFirst");
          await waitFor(() => {
            const target = controller.getFocusedOrPendingMathTarget();
            return target && target.pos === firstTarget.pos;
          });

          markStep("align.tabForward");
          await dispatchMathTab(controller, contentWindow, false);
          markStep("align.waitForwardSelection");
          const forward = await waitFor(() => {
            const snapshot = getMathSelectionSnapshot(controller);
            return (
              snapshot.pos === secondTarget.pos &&
              snapshot.isCollapsed === false &&
              snapshot.selection?.direction === "forward"
            )
              ? snapshot
              : null;
          });

          markStep("align.tabBackward");
          await dispatchMathTab(controller, contentWindow, true);
          markStep("align.waitBackwardSelection");
          const backward = await waitFor(() => {
            const snapshot = getMathSelectionSnapshot(controller);
            return (
              snapshot.pos === firstTarget.pos &&
              snapshot.isCollapsed === false &&
              snapshot.selection?.direction === "forward"
            )
              ? snapshot
              : null;
          });

          if (forward.isCollapsed || forward.selection?.direction !== "forward") {
            throw new Error(`Expected forward Tab to select the destination align cell: ${JSON.stringify(forward)}`);
          }

          if (backward.isCollapsed || backward.selection?.direction !== "forward") {
            throw new Error(`Expected backward Tab to select the previous align cell: ${JSON.stringify(backward)}`);
          }

          return {
            forward,
            backward,
          };
        });
      }

      async function runTableTabScenario() {
        return withController(async (controller, contentWindow) => {
          markStep("table.insert");
          insertCommand(controller, "table");

          markStep("table.insertFirst");
          controller.dispatchTransaction(controller.view.state.tr.insertText("x"));

          markStep("table.moveSecond");
          if (!controller.moveToNextTableCellOrExit()) {
            throw new Error("Expected to move from the first table cell to the second");
          }

          markStep("table.insertSecond");
          controller.dispatchTransaction(controller.view.state.tr.insertText("y"));

          markStep("table.moveFirst");
          if (!controller.moveToPreviousTableCellOrExit()) {
            throw new Error("Expected to move back to the first table cell");
          }

          const beforeForward = getTableSelectionSnapshot(controller);

          markStep("table.tabForward", beforeForward);
          await dispatchEditorKey(controller, contentWindow, "Tab");
          const forward = getTableSelectionSnapshot(controller);

          markStep("table.tabBackward", forward);
          await dispatchEditorKey(controller, contentWindow, "Tab", {
            shiftKey: true,
          });
          const backward = getTableSelectionSnapshot(controller);

          if (
            beforeForward.empty ||
            beforeForward.text !== "x" ||
            beforeForward.rowIndex !== 0 ||
            beforeForward.cellIndex !== 0
          ) {
            throw new Error(`Expected previous-cell entry to select first table cell text: ${JSON.stringify(beforeForward)}`);
          }

          if (
            forward.empty ||
            forward.text !== "y" ||
            forward.rowIndex !== 0 ||
            forward.cellIndex !== 1
          ) {
            throw new Error(`Expected Tab to select second table cell text: ${JSON.stringify(forward)}`);
          }

          if (
            backward.empty ||
            backward.text !== "x" ||
            backward.rowIndex !== 0 ||
            backward.cellIndex !== 0
          ) {
            throw new Error(`Expected Shift+Tab to select first table cell text: ${JSON.stringify(backward)}`);
          }

          return {
            beforeForward,
            forward,
            backward,
          };
        });
      }

      async function runArrowEntryScenario(commandName, expectedWidgetType) {
        return withController(async (controller, contentWindow) => {
          markStep(`${commandName}.insert`);
          insertCommand(controller, commandName);

          markStep(`${commandName}.waitWidget`);
          await waitFor(() => {
            const firstBlock = controller.view.state.doc.firstChild.firstChild;
            return firstBlock?.type?.name === expectedWidgetType;
          });

          const widgetNode = controller.view.state.doc.firstChild.firstChild;
          const widgetPos = 1;

          markStep(`${commandName}.exit`);
          if (!controller.exitFullLineWidgetBoundary(widgetPos, widgetNode, "after")) {
            throw new Error(`Expected to exit ${commandName} to trailing paragraph`);
          }

          markStep(`${commandName}.arrowEnter`);
          await dispatchEditorKey(controller, contentWindow, "ArrowLeft");

          if (commandName === "table") {
            const snapshot = getTableSelectionSnapshot(controller);

            if (snapshot.empty !== true || snapshot.cellIndex !== 1) {
              throw new Error(`Expected ArrowLeft to enter the table with a collapsed selection: ${JSON.stringify(snapshot)}`);
            }

            return snapshot;
          }

          const snapshot = await waitFor(() => {
            const value = getMathSelectionSnapshot(controller);
            return value.type === "align_math" ? value : null;
          });

          if (snapshot.isCollapsed !== true) {
            throw new Error(`Expected ArrowLeft to enter align with a collapsed math selection: ${JSON.stringify(snapshot)}`);
          }

          return snapshot;
        });
      }

      try {
        markStep("start");
        const alignTab = await runAlignTabScenario();
        const tableTab = await runTableTabScenario();
        const alignArrow = await runArrowEntryScenario("align", "align_block");
        const tableArrow = await runArrowEntryScenario("table", "table");

        document.body.dataset.result = "pass";
        document.body.dataset.alignTab = JSON.stringify(alignTab);
        document.body.dataset.tableTab = JSON.stringify(tableTab);
        document.body.dataset.alignArrow = JSON.stringify(alignArrow);
        document.body.dataset.tableArrow = JSON.stringify(tableArrow);
      } catch (error) {
        document.body.dataset.result = "fail";
        document.body.dataset.error = error instanceof Error ? error.message : String(error);
        console.error(error);
      }
    </script>
  </body>
</html>
