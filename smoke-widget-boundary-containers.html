<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Widget Boundary Container Smoke</title>
  </head>
  <body data-result="pending">
    <script type="module">
      function waitFor(condition, timeout = 10000) {
        const startedAt = Date.now();

        return new Promise((resolve, reject) => {
          const tick = () => {
            const value = condition();

            if (value) {
              resolve(value);
              return;
            }

            if (Date.now() - startedAt > timeout) {
              reject(new Error("Timed out waiting for condition"));
              return;
            }

            setTimeout(tick, 50);
          };

          tick();
        });
      }

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      async function withController(run) {
        const iframe = document.createElement("iframe");
        iframe.src = `./?debug=1&smoke=${Date.now()}-${Math.random()}`;
        iframe.style.width = "1280px";
        iframe.style.height = "900px";
        document.body.append(iframe);

        await waitFor(
          () => iframe.contentWindow?.__latexOnlineDebug?.controller?.view
        );

        const controller = iframe.contentWindow.__latexOnlineDebug.controller;
        controller.clear();
        await sleep(80);
        return run(controller, iframe.contentWindow);
      }

      function createParagraphNode(schema, text = "") {
        return text
          ? schema.nodes.paragraph.create(null, schema.text(text))
          : schema.nodes.paragraph.createAndFill();
      }

      function loadListItemDocument(controller) {
        const { schema } = controller.view.state;
        const paragraph = createParagraphNode(schema);
        const listItem = schema.nodes.list_item.create(null, [paragraph]);
        const bulletList = schema.nodes.bullet_list.create(null, [listItem]);
        const page = schema.nodes.page.create({ pageNumber: 1 }, [bulletList]);
        const doc = schema.nodes.doc.create(null, [page]);
        controller.loadDocument(doc);
      }

      function loadTableCellDocument(controller) {
        const { schema } = controller.view.state;
        const paragraph = createParagraphNode(schema);
        const cell = schema.nodes.table_cell.create(null, paragraph);
        const row = schema.nodes.table_row.create(null, [cell]);
        const table = schema.nodes.table.create({ tableStyle: "grid" }, [row]);
        const page = schema.nodes.page.create({ pageNumber: 1 }, [table]);
        const doc = schema.nodes.doc.create(null, [page]);
        controller.loadDocument(doc);
      }

      function findNodeEntry(doc, predicate) {
        let result = null;

        doc.descendants((node, pos) => {
          if (result) {
            return false;
          }

          if (predicate(node, pos)) {
            result = { node, pos };
            return false;
          }

          return true;
        });

        return result;
      }

      function hasAncestorOfType($pos, targetType) {
        for (let depth = $pos.depth; depth >= 0; depth -= 1) {
          if ($pos.node(depth).type === targetType) {
            return true;
          }
        }

        return false;
      }

      function setSelection(controller, pos, bias = 1) {
        const SelectionClass = controller.view.state.selection.constructor;
        const tr = controller.view.state.tr.setSelection(
          SelectionClass.near(controller.view.state.doc.resolve(pos), bias)
        );
        controller.dispatchTransaction(tr);
        controller.activeMathId = null;
        controller.cancelPendingMathFocus();
      }

      function insertCommand(controller, commandName, prefixText = "") {
        controller.view.focus();
        controller.dispatchTransaction(
          controller.view.state.tr.insertText(`${prefixText}\\${commandName}`)
        );

        const state = controller.view.state;
        const { $from } = state.selection;
        const paragraphNode = $from.parent;
        const fullText = paragraphNode.textContent;
        const command = controller.backslashCommands.commandsByName.get(commandName);
        const result = command?.execute({
          state,
          controller,
          match: {
            nameQuery: commandName,
            commandStart: fullText.lastIndexOf(`\\${commandName}`),
            fullText,
            beforeText: fullText.slice(0, $from.parentOffset),
            afterText: fullText.slice($from.parentOffset),
            paragraphNode,
            paragraphPos: $from.before(),
            parentNode: $from.node($from.depth - 1),
            parentIndex: $from.index($from.depth - 1),
          },
        });
        const tr = result?.tr ?? result;

        if (!tr) {
          throw new Error(`Expected \\\\${commandName} command to build a transaction`);
        }

        if (result?.focusMathId) {
          controller.prepareMathInsertion(
            result.focusMathId,
            controller.getCurrentTextToolbarState(),
            result.focusMathEdge ?? "start"
          );
        }

        controller.dispatchTransaction(tr);

        if (result?.focusMathId) {
          controller.focusMathNode(result.focusMathId, result.focusMathEdge ?? "start");
        }
      }

      async function runListItemArrowScenario() {
        return withController(async (controller) => {
          loadListItemDocument(controller);
          await sleep(80);
          insertCommand(controller, "align", "Intro ");

          const alignEntry = await waitFor(() =>
            findNodeEntry(
              controller.view.state.doc,
              (node) => node.type === controller.view.state.schema.nodes.align_block
            )
          );
          const introParagraphEntry = findNodeEntry(
            controller.view.state.doc,
            (node) =>
              node.type === controller.view.state.schema.nodes.paragraph &&
              node.textContent === "Intro "
          );

          if (!introParagraphEntry) {
            throw new Error("Expected intro paragraph before list-item widget");
          }

          setSelection(
            controller,
            introParagraphEntry.pos + introParagraphEntry.node.nodeSize - 1,
            -1
          );
          await sleep(80);

          const selection = controller.view.state.selection;
          const { schema } = controller.view.state;

          if (
            selection.$from.parent.type !== schema.nodes.paragraph ||
            selection.$from.parent.textContent !== "Intro " ||
            !hasAncestorOfType(selection.$from, schema.nodes.list_item)
          ) {
            throw new Error(
              `Expected paragraph selection inside list item: ${JSON.stringify(
                controller.view.state.doc.toJSON()
              )}`
            );
          }

          if (!controller.enterAdjacentWidget("forward")) {
            throw new Error("Expected forward nested-widget entry inside list item");
          }

          const target = await waitFor(() => controller.getFocusedOrPendingMathTarget());
          const expectedId = alignEntry.node.firstChild?.firstChild?.attrs?.id ?? null;

          return {
            expectedId,
            actualId: target.id,
            type: target.node.type.name,
          };
        });
      }

      async function runTableCellArrowScenario() {
        return withController(async (controller) => {
          loadTableCellDocument(controller);
          await sleep(80);
          insertCommand(controller, "align");

          const alignEntry = await waitFor(() =>
            findNodeEntry(
              controller.view.state.doc,
              (node) => node.type === controller.view.state.schema.nodes.align_block
            )
          );
          const trailingParagraphEntry = findNodeEntry(
            controller.view.state.doc,
            (node, pos) =>
              pos > alignEntry.pos &&
              node.type === controller.view.state.schema.nodes.paragraph &&
              node.textContent === ""
          );

          if (!trailingParagraphEntry) {
            throw new Error("Expected trailing paragraph after table-cell widget");
          }

          setSelection(controller, trailingParagraphEntry.pos + 1, 1);
          await sleep(80);

          const selection = controller.view.state.selection;
          const { schema } = controller.view.state;

          if (
            selection.$from.parent.type !== schema.nodes.paragraph ||
            !hasAncestorOfType(selection.$from, schema.nodes.table_cell)
          ) {
            throw new Error(
              `Expected paragraph selection inside table cell: ${JSON.stringify(
                controller.view.state.doc.toJSON()
              )}`
            );
          }

          if (!controller.enterAdjacentWidget("backward")) {
            throw new Error("Expected backward nested-widget entry inside table cell");
          }

          const target = await waitFor(() => controller.getFocusedOrPendingMathTarget());
          const expectedId = alignEntry.node.lastChild?.lastChild?.attrs?.id ?? null;

          return {
            expectedId,
            actualId: target.id,
            type: target.node.type.name,
          };
        });
      }

      async function runTableCellBackspaceScenario() {
        return withController(async (controller) => {
          loadTableCellDocument(controller);
          await sleep(80);
          insertCommand(controller, "align");

          const alignEntry = await waitFor(() =>
            findNodeEntry(
              controller.view.state.doc,
              (node) => node.type === controller.view.state.schema.nodes.align_block
            )
          );
          const trailingParagraphEntry = findNodeEntry(
            controller.view.state.doc,
            (node, pos) =>
              pos > alignEntry.pos &&
              node.type === controller.view.state.schema.nodes.paragraph &&
              node.textContent === ""
          );

          if (!trailingParagraphEntry) {
            throw new Error("Expected trailing paragraph after table-cell widget");
          }

          setSelection(controller, trailingParagraphEntry.pos + 1, 1);
          await sleep(80);
          if (!controller.removeAdjacentWidget("backward")) {
            throw new Error("Expected removeAdjacentWidget('backward') to remove nested widget");
          }
          await sleep(120);

          const { schema } = controller.view.state;
          const remainingAlign = findNodeEntry(
            controller.view.state.doc,
            (node) => node.type === schema.nodes.align_block
          );
          const outerTable = findNodeEntry(
            controller.view.state.doc,
            (node) => node.type === schema.nodes.table
          )?.node ?? null;
          const firstCell = outerTable?.firstChild?.firstChild ?? null;

          if (
            remainingAlign ||
            firstCell?.type !== schema.nodes.table_cell ||
            firstCell.childCount < 1 ||
            Array.from({ length: firstCell.childCount }, (_unused, index) =>
              firstCell.child(index).type === schema.nodes.paragraph
            ).includes(false)
          ) {
            throw new Error(
              `Unexpected table-cell doc after Backspace: ${JSON.stringify(
                controller.view.state.doc.toJSON()
              )}`
            );
          }

          return controller.view.state.doc.toJSON();
        });
      }

      try {
        let listItemArrow;
        let tableCellArrow;
        let tableCellBackspace;

        try {
          listItemArrow = await runListItemArrowScenario();
        } catch (error) {
          throw new Error(
            `listItemArrow: ${error instanceof Error ? error.message : String(error)}`
          );
        }

        try {
          tableCellArrow = await runTableCellArrowScenario();
        } catch (error) {
          throw new Error(
            `tableCellArrow: ${error instanceof Error ? error.message : String(error)}`
          );
        }

        try {
          tableCellBackspace = await runTableCellBackspaceScenario();
        } catch (error) {
          throw new Error(
            `tableCellBackspace: ${error instanceof Error ? error.message : String(error)}`
          );
        }

        if (
          listItemArrow.expectedId !== listItemArrow.actualId ||
          listItemArrow.type !== "align_math"
        ) {
          throw new Error(`List-item arrow re-entry mismatch: ${JSON.stringify(listItemArrow)}`);
        }

        if (
          tableCellArrow.expectedId !== tableCellArrow.actualId ||
          tableCellArrow.type !== "align_math"
        ) {
          throw new Error(`Table-cell arrow re-entry mismatch: ${JSON.stringify(tableCellArrow)}`);
        }

        document.body.dataset.result = "pass";
        document.body.dataset.listItemArrow = JSON.stringify(listItemArrow);
        document.body.dataset.tableCellArrow = JSON.stringify(tableCellArrow);
        document.body.dataset.tableCellBackspace = JSON.stringify(tableCellBackspace);
      } catch (error) {
        document.body.dataset.result = "fail";
        document.body.dataset.error = error instanceof Error ? error.message : String(error);
        console.error(error);
      }
    </script>
  </body>
</html>
